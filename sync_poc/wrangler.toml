name = "voiscripter-sync-dev"
main = "worker.js"
compatibility_date = "2025-01-01"
workers_dev = true

# KV Namespace binding
[[kv_namespaces]]
binding = "SYNC_KV"
id = "8579b723057f4a56bd2b0224062e916d"

# Per-UUID activity meter (Durable Object, SQLite-backed → free plan compatible).
# DO storage does NOT consume the KV write quota. Drives adaptive PoW difficulty.
[[durable_objects.bindings]]
name = "UUID_METER"
class_name = "UuidMeter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UuidMeter"]

# Proof-of-Work difficulty (leading zero bits). Tune for "~0.3-1s on a normal
# device". Higher = harder for bots but slower UX. Override per env as needed.
# NOTE: POW_SECRET is NOT stored here. Set it as a secret:
#   wrangler secret put POW_SECRET
#   wrangler secret put POW_SECRET --env prd
# POW_DIFFICULTY: base difficulty for normal use (leading zero bits, ~0.3-1s).
# Adaptive escalation (per-UUID, 24h window): a UUID exceeding POW_ESC_THRESHOLD
# requests/24h gains POW_ESC_BITS bits per POW_ESC_STEP excess requests, capped
# at POW_MAX_DIFFICULTY. Brand-new UUIDs pay a one-time POW_NEW_UUID_DIFFICULTY
# (taxes UUID rotation). Tune by watching for abuse recurrence.
[vars]
POW_DIFFICULTY = "18"
# Short-burst escalation (per-UUID): >SHORT_THRESHOLD requests within the
# effective window adds SHORT_BITS bits per excess request (steep). With
# threshold 3 / 4 bits: 4th req ~difficulty 22, 5th ~26, 6th ~30 (cap).
POW_SHORT_WINDOW_MIN = "10"
POW_SHORT_THRESHOLD = "3"
POW_SHORT_BITS = "4"
# Progressive penalty: persistent breaching lengthens the window (max(base,
# level*STEP) min) so difficulty can't be reset by briefly pausing. Decays one
# level per DECAY_MIN of quiet.
POW_PENALTY_STEP_MIN = "15"
POW_MAX_PENALTY = "8"
POW_PENALTY_DECAY_MIN = "60"
# 24h backstop for slow-but-sustained abuse.
POW_ESC_THRESHOLD = "50"
POW_ESC_STEP = "10"
POW_ESC_BITS = "2"
POW_MAX_DIFFICULTY = "30"
POW_NEW_UUID_DIFFICULTY = "22"

# Rate Limiting bindings (in-memory, free, do NOT consume KV write quota).
# period must be 10 or 60 (seconds). namespace_id must be unique per binding.
# Ref: https://developers.cloudflare.com/workers/runtime-apis/bindings/rate-limit/
[[ratelimits]]
name = "RL_PUT"
namespace_id = "1001"
simple = { limit = 12, period = 60 }

[[ratelimits]]
name = "RL_GET"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

[[ratelimits]]
name = "RL_CHALLENGE"
namespace_id = "1003"
simple = { limit = 30, period = 60 }

[env.prd]
name = "voiscripter-sync-prd"
workers_dev = true

[[env.prd.kv_namespaces]]
binding = "SYNC_KV"
id = "8579b723057f4a56bd2b0224062e916d"

[[env.prd.durable_objects.bindings]]
name = "UUID_METER"
class_name = "UuidMeter"

[[env.prd.migrations]]
tag = "v1"
new_sqlite_classes = ["UuidMeter"]

[env.prd.vars]
POW_DIFFICULTY = "18"
POW_SHORT_WINDOW_MIN = "10"
POW_SHORT_THRESHOLD = "3"
POW_SHORT_BITS = "4"
POW_PENALTY_STEP_MIN = "15"
POW_MAX_PENALTY = "8"
POW_PENALTY_DECAY_MIN = "60"
POW_ESC_THRESHOLD = "50"
POW_ESC_STEP = "10"
POW_ESC_BITS = "2"
POW_MAX_DIFFICULTY = "30"
POW_NEW_UUID_DIFFICULTY = "22"

[[env.prd.ratelimits]]
name = "RL_PUT"
namespace_id = "1001"
simple = { limit = 12, period = 60 }

[[env.prd.ratelimits]]
name = "RL_GET"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

[[env.prd.ratelimits]]
name = "RL_CHALLENGE"
namespace_id = "1003"
simple = { limit = 30, period = 60 }

# Import HTML as text module
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = false

[observability.logs]
enabled = false
invocation_logs = true
